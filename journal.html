<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FS | PREMIUM</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.onkeydown=e=>{if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74||e.keyCode==67))||(e.ctrlKey&&e.keyCode==85))return false};
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap');
:root{--blue:#38bdf8;--red:#ef4444;--green:#4ade80;--bg:#050a14;--card:#0d1117;--be:#eab308}
*{margin:0;padding:0;box-sizing:border-box;outline:0}
body{background:var(--bg);color:white;font-family:Poppins,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#auth-screen{position:fixed;inset:0;background:radial-gradient(circle,#0a1428,#050a14);z-index:9999;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--card);padding:40px;border-radius:30px;border:1px solid #1f2937;text-align:center;width:90%;max-width:400px}
.btn-google{width:100%;background:white;color:#111;border:0;padding:15px;border-radius:15px;font-weight:900;margin-top:20px;font-family:Orbitron;cursor:pointer}
#sidebar{position:fixed;left:-300px;top:0;bottom:0;width:280px;background:#0a0e14;z-index:2000;transition:.3s;border-right:1px solid #1f2937;padding:20px;display:flex;flex-direction:column}
#sidebar.open{left:0}.side-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1999;display:none;backdrop-filter:blur(5px)}
.side-overlay.show{display:block}.side-link{padding:15px;color:#9ca3af;border-radius:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:13px}
.side-link.active{background:rgba(56,189,248,.1);color:white;border-left:4px solid var(--blue)}
.fixed-top{padding:15px;background:var(--bg);display:flex;align-items:center;border-bottom:1px solid #1f2937;z-index:100}
.menu-toggle{font-size:24px;cursor:pointer;color:var(--blue);margin-right:20px}.logo{font-family:Orbitron;font-size:1rem;flex:1;text-align:center}
.content-container{flex:1;overflow-y:auto;padding-bottom:50px}.tab-content{display:none;padding:15px}.tab-content.active{display:block}
.form-card{background:var(--card);border-radius:20px;padding:20px;border:1px solid #1f2937;margin-bottom:20px}
.chip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.chip{text-align:center;padding:10px 5px;border-radius:10px;background:#111827;border:1px solid #1f2937;font-size:9px;color:#555;cursor:pointer}
.chip.active{border-color:var(--blue);color:white;background:rgba(56,189,248,.1)}
.poi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:#050a14;padding:15px;border-radius:15px}
.check-item{display:flex;align-items:center;gap:8px;font-size:10px}.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0}
.up-box{background:#0a0e14;border:2px dashed #1f2937;border-radius:15px;padding:15px;text-align:center;min-height:100px;position:relative}
.up-box input{position:absolute;inset:0;opacity:0}.up-box img{width:100%;height:80px;object-fit:cover;display:none;margin-top:5px}
.btn-save{width:100%;background:var(--blue);color:black;border:0;padding:18px;border-radius:15px;font-weight:900;font-family:Orbitron}
.mon-sel{background:#0d1117;border:1px solid #1f2937;color:white;padding:10px;border-radius:10px;flex:1;font-size:11px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:20px}
.cal-day{aspect-ratio:1/1;background:#0a0e14;border-radius:5px;font-size:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid #1f2937}
.cal-day.profit{border-color:var(--green);color:var(--green)}.cal-day.loss{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="auth-screen"><div class="auth-card"><h1 style="font-family:Orbitron">FS CLOUD</h1><button class="btn-google" onclick="login()">LOGIN GOOGLE</button></div></div>
<div id="sidebar">
<div class="side-link" onclick="openTab('announce-tab',this)">📢 NEWS</div>
<div class="side-link" onclick="openTab('chart-tab',this)">📈 CHART</div>
<div class="side-link active" onclick="openTab('journal-tab',this)">📓 JOURNAL</div>
<div class="side-link" onclick="openTab('monitor-tab',this)">🖥️ PERFORMANCE</div>
<div class="side-link" onclick="openTab('community-tab',this)">👥 COMMUNITY</div>
<div class="side-link" onclick="openTab('broker-tab',this)">🏦 BROKER</div>
<div class="side-link" onclick="openTab('donasi-tab',this)">☕ DONATION</div>
<div class="side-link" onclick="logout()" style="color:var(--red);margin-top:auto">🚪 EXIT</div>
</div>
<div class="side-overlay" onclick="toggleMenu()"></div>
<div class="fixed-top"><div class="menu-toggle" onclick="toggleMenu()">☰</div><h1 class="logo">FREEDOM SYNDICATE</h1></div>
<div class="content-container">
<div id="announce-tab" class="tab-content"><div class="form-card"><h3>⚠️ SERVER INFO</h3><p>Maintenance Saturday.</p></div></div>
<div id="chart-tab" class="tab-content"><div id="tv_v60" style="height:400px;border-radius:20px;overflow:hidden"></div></div>
<div id="journal-tab" class="tab-content active">
<div class="form-card"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
<input type="number" id="calc-bal" placeholder="BAL $" oninput="calcLot()" class="mon-sel">
<input type="number" id="calc-risk" placeholder="RISK %" oninput="calcLot()" class="mon-sel">
<input type="number" id="calc-sl" placeholder="SL PIP" oninput="calcLot()" class="mon-sel">
</div><p style="text-align:center;margin-top:10px">Lot: <b id="res-lot" style="color:var(--be)">0.00</b> | Risk: <b id="res-margin" style="color:var(--blue)">$0</b></p></div>
<form id="tradingForm" class="form-card">
<label style="font-size:10px">DATE</label><input type="date" id="date" style="width:100%;background:#050a14;color:white;border:1px solid #333;padding:10px;border-radius:10px;margin-bottom:15px">
<label style="font-size:10px">PAIR</label><select id="pair" style="width:100%;background:#050a14;color:white;border:1px solid #333;padding:10px;border-radius:10px;margin-bottom:15px">
<option value="XAUUSD">XAUUSD</option><option value="EURUSD">EURUSD</option><option value="GBPUSD">GBPUSD</option><option value="NAS100">NAS100</option><option value="US30">US30</option><option value="BTCUSD">BTCUSD</option>
</select>
<label style="font-size:10px">SESSION</label><div class="chip-grid" style="margin-bottom:15px">
<div class="chip" onclick="setV('session','SYDNEY',this)">SYDNEY</div><div class="chip" onclick="setV('session','ASIA',this)">ASIA</div><div class="chip" onclick="setV('session','LONDON',this)">LONDON</div><div class="chip" onclick="setV('session','NY',this)">NY</div>
</div>
<label style="font-size:10px">POI ICT</label><div class="poi-grid" style="margin-bottom:15px">
<label class="check-item"><input type="checkbox" class="poi-check" value="QM"> QM</label><label class="check-item"><input type="checkbox" class="poi-check" value="FVG"> FVG</label><label class="check-item"><input type="checkbox" class="poi-check" value="OB"> OB</label>
<label class="check-item"><input type="checkbox" class="poi-check" value="SMT"> SMT</label><label class="check-item"><input type="checkbox" class="poi-check" value="MSS"> MSS</label><label class="check-item"><input type="checkbox" class="poi-check" value="LIQ"> LIQ</label>
<label class="check-item"><input type="checkbox" class="poi-check" value="IFVG"> IFVG</label><label class="check-item"><input type="checkbox" class="poi-check" value="CISD"> CISD</label><label class="check-item"><input type="checkbox" class="poi-check" value="SUP"> SUP</label>
<label class="check-item"><input type="checkbox" class="poi-check" value="RES"> RES</label><label class="check-item"><input type="checkbox" class="poi-check" value="PSP"> PSP</label><label class="check-item"><input type="checkbox" class="poi-check" value="SBR"> SBR</label>
</div>
<label style="font-size:10px">EMOTION</label><div class="chip-grid" style="margin-bottom:15px">
<div class="chip" onclick="setV('emo','CALM',this)">CALM</div><div class="chip" onclick="setV('emo','FOMO',this)">FOMO</div><div class="chip" onclick="setV('emo','REVENGE',this)">REVENGE</div>
</div>
<label style="font-size:10px">P&L ($)</label><input type="number" id="pnl" class="mon-sel" style="width:100%;margin-bottom:15px">
<div class="photo-grid"><div class="up-box">BEFORE<input type="file" onchange="procImg(this,'pb')"><img id="pb"></div><div class="up-box">AFTER<input type="file" onchange="procImg(this,'pa')"><img id="pa"></div></div>
<div class="chip-grid" style="margin-bottom:15px"><div class="chip" onclick="setV('res','TP',this)">💰 TP</div><div class="chip" onclick="setV('res','SL',this)">💀 SL</div><div class="chip" onclick="setV('res','BE',this)">⚖️ BE</div></div>
<button type="button" class="btn-save" onclick="save()">SAVE TRADE</button>
</form><div id="hist"></div></div>
<div id="monitor-tab" class="tab-content">
<div style="display:flex;gap:5px"><select id="mon-pair" class="mon-sel" onchange="loadData()"><option value="ALL">ALL PAIRS</option><option value="XAUUSD">XAUUSD</option></select>
<select id="mon-month" class="mon-sel" onchange="loadData()"><option value="ALL">ALL TIME</option><option value="04" selected>APR</option></select></div>
<div class="form-card" style="margin-top:15px;height:200px"><canvas id="equityChart"></canvas></div>
<div id="cal" class="cal-grid"></div></div>
<div id="community-tab" class="tab-content"><div class="form-card" style="height:350px;display:flex;flex-direction:column"><div id="chat-messages" style="flex:1;overflow-y:auto"></div><div style="display:flex;gap:5px;margin-top:10px"><input type="text" id="chat-input" class="mon-sel" placeholder="Chat..."><button onclick="sendMsg()" style="background:var(--blue);padding:10px;border-radius:10px;border:0">SEND</button></div></div></div>
<div id="broker-tab" class="tab-content">
<div class="form-card"><h3>EXNESS</h3><button onclick="window.open('https://one.exnessonelink.com/a/f4ntqgcba4')" style="width:100%;padding:10px;background:var(--blue);border:0;border-radius:10px;margin-top:10px">DAFTAR</button></div>
<div class="form-card"><h3>HEADWAY</h3><button onclick="window.open('https://headway.partners/user/signup?hwp=7c27db')" style="width:100%;padding:10px;background:white;color:000;border:0;border-radius:10px;margin-top:10px">DAFTAR</button></div>
</div>
<div id="donasi-tab" class="tab-content" style="text-align:center"><div class="form-card"><h2>QRIS DONASI</h2><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=FS-DONATION" style="border:5px solid white;border-radius:10px;margin-top:15px"></div></div>
</div>
<script>
const config={apiKey:"AIzaSyCAXjaw82F1gdZUZfpDi1_9-5-ISU0aDVs",authDomain:"freedomsyndicatecloud.firebaseapp.com",databaseURL:"https://freedomsyndicatecloud-default-rtdb.firebaseio.com",projectId:"freedomsyndicatecloud",storageBucket:"freedomsyndicatecloud.firebasestorage.app",messagingSenderId:"915558934014",appId:"1:915558934014:web:08442d20712f2010f58caf"};
firebase.initializeApp(config);const auth=firebase.auth(),rtdb=firebase.database();let curU=null,sRes='',sSession='',sEmo='',bB='',bA='',myChart=null,allTrades=[];
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');document.querySelector('.side-overlay').classList.toggle('show')}
function openTab(id,el){document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.side-link').forEach(l=>l.classList.remove('active'));document.getElementById(id).classList.add('active');if(el)el.classList.add('active');if(id==='chart-tab')document.getElementById('tv_v60').innerHTML=`<iframe style="width:100%;height:100%;border:none" src="https://s.tradingview.com/widgetembed/?symbol=XAUUSD&interval=15&theme=dark"></iframe>`;toggleMenu()}
function login(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}
function logout(){auth.signOut().then(()=>location.reload())}
auth.onAuthStateChanged(u=>{if(u){curU=u;document.getElementById('auth-screen').style.display='none';loadData();loadChat()}else{document.getElementById('auth-screen').style.display='flex'}});
function setV(t,v,el){el.parentNode.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');if(t==='res')sRes=v;if(t==='session')sSession=v;if(t==='emo')sEmo=v}
function procImg(i,id){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById(id).src=e.target.result;document.getElementById(id).style.display='block';if(id==='pb')bB=e.target.result;else bA=e.target.result};r.readAsDataURL(f)}
function save(){if(!sRes||!curU)return alert("Result!");const p=Array.from(document.querySelectorAll('.poi-check:checked')).map(c=>c.value);const d={date:document.getElementById('date').value||new Date().toISOString().split('T')[0],pair:document.getElementById('pair').value,session:sSession,emotion:sEmo,poi:p.join(','),pnl:parseFloat(document.getElementById('pnl').value)||0,res:sRes,bef:bB,aft:bA};rtdb.ref('users/'+curU.uid+'/trades').push(d).then(()=>{alert("OK!");loadData()})}
function loadData(){if(!curU)return;rtdb.ref('users/'+curU.uid+'/trades').on('value',s=>{allTrades=s.val()?Object.entries(s.val()).map(([id,v])=>({...v,id})):[];render(allTrades)})}
function sendMsg(){const i=document.getElementById('chat-input');if(i.value.trim()){rtdb.ref('chat').push({name:curU.email.split('@')[0],msg:i.value});i.value=''}}
function loadChat(){rtdb.ref('chat').limitToLast(20).on('value',s=>{const b=document.getElementById('chat-messages');b.innerHTML='';s.forEach(c=>{const d=c.val();b.innerHTML+=`<div><b style="font-size:10px;color:var(--blue)">${d.name}</b><br><span style="font-size:12px">${d.msg}</span></div>`});b.scrollTop=b.scrollHeight})}
function calcLot(){const b=parseFloat(document.getElementById('calc-bal').value),r=parseFloat(document.getElementById('calc-risk').value),s=parseFloat(document.getElementById('calc-sl').value);if(b&&r&&s){document.getElementById('res-lot').innerText=((b*(r/100))/(s*10)).toFixed(2);document.getElementById('res-margin').innerText=(b*(r/100)).toFixed(0)}}
function render(t){const h=document.getElementById('hist');h.innerHTML='';let tp=0,eq=[0],dD={};const fM=document.getElementById('mon-month').value,fP=document.getElementById('mon-pair').value;t.forEach(v=>{if((fM==='ALL'||v.date.split('-')[1]===fM)&&(fP==='ALL'||v.pair===fP)){tp+=v.pnl;eq.push(tp);if(!dD[v.date])dD[v.date]=0;dD[v.date]+=v.pnl}});[...t].reverse().forEach(v=>{h.innerHTML+=`<div class="form-card"><div class="hist-head"><b>${v.date} | ${v.pair}</b><span style="color:${v.res==='TP'?'#4ade80':'#ef4444'}">${v.res} ($${v.pnl})</span></div><div class="photo-grid">${v.bef?`<img src="${v.bef}" class="h-img">`:''}${v.aft?`<img src="${v.aft}" class="h-img">`:''}</div></div>`});if(myChart)myChart.destroy();myChart=new Chart(document.getElementById('equityChart').getContext('2d'),{type:'line',data:{labels:eq.map((_,i)=>i),datasets:[{data:eq,borderColor:'#38bdf8',tension:0.3,fill:true,backgroundColor:'rgba(56,189,248,0.1)'}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}}}});const cl=document.getElementById('cal');cl.innerHTML='';for(let i=1;i<=30;i++){const d=`2026-04-${i.toString().padStart(2,'0')}`,p=dD[d]||0;cl.innerHTML+=`<div class="cal-day ${p>0?'profit':p<0?'loss':''}"><span>${i}</span><b>${p?p.toFixed(0):''}</b></div>`}}
</script>
</body>
</html>
