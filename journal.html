    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCAXjaw82F1gdZUZfpDi1_9-5-ISU0aDVs", authDomain: "freedomsyndicatecloud.firebaseapp.com", databaseURL: "https://freedomsyndicatecloud-default-rtdb.firebaseio.com", projectId: "freedomsyndicatecloud", storageBucket: "freedomsyndicatecloud.firebasestorage.app", messagingSenderId: "915558934014", appId: "1:915558934014:web:08442d20712f2010f58caf" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), rtdb = firebase.database();
        let curUser = null, sRes = '', sSession = '', sStyle = '', bB = '', bA = '', myChart = null, allTrades = [];

        function login() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).catch(e => { if(e.code === 'auth/popup-blocked') auth.signInWithRedirect(p); else alert(e.message); }); }
        
        auth.onAuthStateChanged(u => { 
            if(u){ 
                curUser = u; 
                document.getElementById('auth-screen').style.display='none'; 
                document.getElementById('display-user').innerText="ACTIVE: "+u.email; 
                loadData(); 
                updateChart(); 
                loadChat(); 
                setupTracker(); 
            } else { 
                document.getElementById('auth-screen').style.display='flex'; 
            }
        });

        function setupTracker() { const pRef = rtdb.ref('presence/' + curUser.uid); rtdb.ref('.info/connected').on('value', snap => { if (snap.val() === true) { pRef.set({ email: curUser.email, status: "online" }); pRef.onDisconnect().remove(); }}); rtdb.ref('presence').on('value', snap => { document.getElementById('online-users').innerText = snap.numChildren(); }); rtdb.ref('users').on('value', snap => { document.getElementById('total-users').innerText = snap.numChildren(); }); }
        function sendMsg() { const input = document.getElementById('chat-input'); if(!input.value.trim()) return; rtdb.ref('chat').push({ uid: curUser.uid, name: curUser.email.split('@')[0], msg: input.value, ts: firebase.database.ServerValue.TIMESTAMP }); input.value = ''; }
        function loadChat() { rtdb.ref('chat').limitToLast(50).on('value', snap => { const box = document.getElementById('chat-messages'); box.innerHTML = ''; snap.forEach(child => { const d = child.val(); const isM = d.uid === curUser.uid; const div = document.createElement('div'); div.className = `msg-bubble ${isM ? 'mine' : ''}`; div.innerHTML = `<div style="font-size:8px; color:var(--blue); margin-bottom:2px;"><b>${d.name}</b></div><div>${d.msg}</div>`; box.appendChild(div); }); box.scrollTop = box.scrollHeight; }); }

        function calcLot() {
            const b = parseFloat(document.getElementById('calc-bal').value) || 0, r = parseFloat(document.getElementById('calc-risk').value) || 0, s = parseFloat(document.getElementById('calc-sl').value) || 0, lev = parseFloat(document.getElementById('calc-lev').value) || 1;
            if(b>0 && r>0 && s>0) { const l = (b*(r/100))/(s*10); const m = (l*100000)/lev; document.getElementById('res-lot').innerText = l.toFixed(2) + " Lot"; document.getElementById('res-margin').innerText = "$ " + m.toFixed(2); } 
            else { document.getElementById('res-lot').innerText = "0.00 Lot"; document.getElementById('res-margin').innerText = "$ 0.00"; }
        }

        function openTab(id, el) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); if(id==='chart-tab') updateChart(); if(id==='monitor-tab' || id==='community-tab') loadData(); }
        function setV(t, v, el) { el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); if(t==='res') sRes = v; if(t==='session') sSession = v; if(t==='style') sStyle = v; }
        function procImg(i, id) { const f = i.files[0]; if(!f) return; const r = new FileReader(); r.onload = e => { const b = e.target.result; document.getElementById(id).src = b; document.getElementById(id).style.display = 'block'; if(id==='pb') bB = b; else bA = b; }; r.readAsDataURL(f); }
        
        // PERBAIKAN FUNGSI SAVE (NO RELOAD & CLEAN URL)
        function save() { 
            if(!sRes || !curUser) return alert("Select Result!");
            
            const mUsed = parseFloat(document.getElementById('res-margin').innerText.replace('$ ','')) || 0;
            const t = { 
                date: document.getElementById('date').value, 
                time: new Date().toLocaleTimeString(), 
                pair: document.getElementById('pair').value, 
                session: sSession, 
                poi: Array.from(document.querySelectorAll('.poi-check:checked')).map(cb => cb.value), 
                entry_style: sStyle, 
                reason: document.getElementById('reason').value, 
                rr: document.getElementById('rr').value, 
                pnl: parseFloat(document.getElementById('pnl').value) || 0, 
                res: sRes, 
                margin: mUsed, 
                bef: bB, 
                aft: bA 
            };

            rtdb.ref('users/' + curUser.uid + '/trades').push(t).then(() => { 
                alert("TRANSACTION SAVED SUCCESSFULLY!");
                resetForm(); // Bersihkan form tanpa reload
                loadData();  // Update list secara realtime
            }).catch(err => alert("Error: " + err.message));
        }

        function resetForm() {
            document.getElementById('tradingForm').reset();
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.poi-check').forEach(cb => cb.checked = false);
            document.getElementById('pb').style.display = 'none';
            document.getElementById('pa').style.display = 'none';
            sRes = ''; sSession = ''; sStyle = ''; bB = ''; bA = '';
        }

        function loadData() { 
            if(!curUser) return;
            rtdb.ref('users/' + curUser.uid + '/trades').on('value', snap => { 
                allTrades = snap.val() ? Object.entries(snap.val()).map(([id, val]) => ({...val, id})) : []; 
                render(allTrades); 
            }); 
        }

        function del(id) { if(confirm("Hapus?")) rtdb.ref('users/' + curUser.uid + '/trades/' + id).remove(); }
        function updateChart() { const p = document.getElementById('chart-pair').value.toUpperCase(); document.getElementById('tv_v60').innerHTML = ''; new TradingView.widget({"autosize": true, "symbol": p, "interval": "15", "theme": "dark", "container_id": "tv_v60"}); }
        function openZoom(s) { document.getElementById('zoom-target').src = s; document.getElementById('modal-zoom').style.display = 'flex'; }

        function render(trades) {
            const h = document.getElementById('hist'); h.innerHTML = ''; let totalP = 0, win = 0, eqData = [0], labels = ['Start'];
            const fP = document.getElementById('mon-pair').value, fM = document.getElementById('mon-month').value;
            const sorted = trades.sort((a,b) => new Date(a.date+' '+a.time) - new Date(b.date+' '+b.time));
            
            sorted.forEach(t => { 
                const tM = t.date ? t.date.split('-')[1] : ''; 
                if((fP==='ALL'||t.pair===fP) && (fM==='ALL'||tM===fM)) { 
                    totalP += t.pnl; 
                    if(t.res === 'TP') win++; 
                    eqData.push(totalP); 
                    labels.push(t.date); 
                } 
            });

            sorted.slice().reverse().forEach(t => { 
                const card = document.createElement('div'); card.className = 'history-card'; 
                card.innerHTML = `<div class="btn-del" onclick="del('${t.id}')">✕</div>
                <div class="h-header">${t.date} ${t.time || ''} | ${t.pair} (${t.res})</div>
                <div class="h-detail">
                    <b>Session:</b> ${t.session || '-'} | <b>Model:</b> ${t.entry_style || '-'}<br>
                    <b>Margin:</b> $${t.margin || 0} | <b>POI:</b> ${t.poi ? t.poi.join(', ') : '-'}<br>
                    <b>Reason:</b> <i>${t.reason || '-'}</i>
                </div>
                <div class="tracker-display">${t.bef ? `<img src="${t.bef}" class="tracker-img" onclick="openZoom('${t.bef}')">` : ''}${t.aft ? `<img src="${t.aft}" class="tracker-img" onclick="openZoom('${t.aft}')">` : ''}</div>`; 
                h.appendChild(card);
            });

            document.getElementById('st-pnl').innerText = `$ ${totalP.toFixed(2)}`; 
            document.getElementById('st-wr').innerText = trades.length ? Math.round((win / trades.length) * 100) + "%" : "0%";
            
            const ctx = document.getElementById('equityChart').getContext('2d'); 
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: [{ label: 'Equity', data: eqData, borderColor: '#ef4444', fill: false, tension: 0.3 }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false }, ticks: { color: '#ef4444', font: {size: 8} } } } } });
            
            const cal = document.getElementById('cal'); cal.innerHTML = '';
            const daysData = {}; trades.forEach(t => { if(!daysData[t.date]) daysData[t.date] = 0; daysData[t.date] += t.pnl; });
            for (let i = 1; i <= 31; i++) { 
                const ds = `2026-04-${String(i).padStart(2,'0')}`, pnl = daysData[ds] || 0, div = document.createElement('div'); div.className = `cal-day ${pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : ''}`;
                div.innerHTML = `<span>${i}</span><b style="font-size:6px">${pnl !== 0 ? (pnl > 0 ? '+' : '') + pnl.toFixed(0) : ''}</b>`; cal.appendChild(div);
            }
        }
    </script>
