<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS | Freedom Syndicate V62 ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --blue: #38bdf8; --red: #ef4444; --green: #4ade80; --bg: #050a14; --card: #0d1117; --be: #eab308; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 20px; border: 1px solid #1f2937; width: 100%; max-width: 350px; text-align: center; }
        .btn-google { width: 100%; background: white; color: #444; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-family: 'Poppins'; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; transition: 0.3s; }
        .fixed-top { flex-shrink: 0; padding: 15px 10px 5px 10px; background: var(--bg); z-index: 100; text-align: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 2px; text-shadow: 0 0 10px var(--blue); margin: 0; }
        .nav-tabs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 15px; }
        .tab-btn { cursor: pointer; background: var(--card); border: 1px solid #1f2937; padding: 10px 2px; border-radius: 10px; font-size: 6px; font-weight: bold; color: #9ca3af; text-transform: uppercase; text-align: center; }
        .tab-btn.active { border-color: var(--blue); color: white; background: rgba(56, 189, 248, 0.1); }
        .content-container { flex-grow: 1; position: relative; overflow: hidden; }
        .tab-content { display: none; width: 100%; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .tab-content.active { display: block; }
        .inner-padding { padding: 15px; padding-bottom: 150px; }
        .notion-form { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1f2937; margin-bottom: 25px; }
        .form-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .form-item label { font-size: 9px; color: #777; text-transform: uppercase; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
        .form-item select, .form-item input, .form-item textarea { background: transparent; border: none; color: white; width: 100%; font-size: 13px; outline: none; padding: 5px 0; font-family: 'Poppins'; }
        .chip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .chip { text-align: center; padding: 8px 2px; border-radius: 6px; background: #111827; border: 1px solid #1f2937; font-size: 8px; font-weight: bold; cursor: pointer; color: #555; }
        .chip.active { border-color: var(--blue); color: white; background: rgba(56, 189, 248, 0.1); }
        .chip.active[data-res="TP"] { border-color: var(--green); color: var(--green); }
        .chip.active[data-res="SL"] { border-color: var(--red); color: var(--red); }
        .entry-model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #ffffff; cursor: pointer; }
        .check-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--blue); }
        .upload-box { background: #0a0e14; border: 1px dashed #333; border-radius: 12px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; margin-top: 10px; overflow: hidden; }
        .upload-box img { width: 100%; height: auto; max-height: 100px; object-fit: contain; display: none; margin-top: 5px; }
        .btn-save { width: 100%; background: var(--blue); color: black; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; }
        .history-card { background: #0a0e14; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #1f2937; position: relative; }
        .tracker-display { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .tracker-img { width: 100%; aspect-ratio: 16/9; background: #111827; border-radius: 8px; border: 1px solid #333; object-fit: cover; cursor: pointer; }
        .btn-del { position: absolute; top: 12px; right: 12px; color: var(--red); font-weight: bold; cursor: pointer; font-size: 14px; }
        #modal-zoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; align-items: center; justify-content: center; padding: 10px; }
        #modal-zoom img { max-width: 100%; max-height: 85vh; border: 2px solid var(--blue); border-radius: 10px; object-fit: contain; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1/1.2; background: #111827; border-radius: 6px; font-size: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #1f2937; }
        .cal-day.profit { border-color: var(--green); color: var(--green); }
        .cal-day.loss { border-color: var(--red); color: var(--red); }
        .mon-filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .mon-select { background: #0a0e14; border: 1px solid #1f2937; color: var(--blue); font-size: 9px; padding: 8px; border-radius: 8px; outline: none; width: 100%; }
        .btn-export { background: #1f2937; color: white; border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 9px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .badge { font-size: 7px; padding: 2px 5px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-left: 5px; }
        .badge-session { background: rgba(56, 189, 248, 0.2); color: var(--blue); }
        .psych-alert { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); padding: 10px; border-radius: 12px; margin-bottom: 15px; display: none; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .equity-container { background: var(--card); border: 1px solid #1f2937; border-radius: 15px; padding: 10px; margin-bottom: 15px; height: 180px; }
        .btn-share { position: absolute; top: 12px; right: 35px; color: var(--blue); cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div id="modal-zoom" onclick="this.style.display='none'"><img id="zoom-target" src=""></div>
    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="font-family:'Orbitron'; color:white; font-size:1.1rem;">FREEDOM SYNDICATE</h1>
            <p style="font-size:8px; color:#555; margin-bottom:20px;">V62 CLOUD TERMINAL</p>
            <button class="btn-google" onclick="loginWithGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> LOGIN WITH GOOGLE</button>
        </div>
    </div>
    <div class="fixed-top">
        <h1 class="logo">FREEDOM SYNDICATE</h1>
        <div id="display-user" style="font-size: 7px; color: #444; margin-top: 5px;"></div>
        <nav class="nav-tabs">
            <div class="tab-btn" onclick="openTab('chart-tab', this)">📈 Chart</div>
            <div class="tab-btn active" onclick="openTab('journal-tab', this)">📓 Journal</div>
            <div class="tab-btn" onclick="openTab('monitor-tab', this)">🖥️ Monitor</div>
            <div class="tab-btn" onclick="openTab('broker-tab', this)">🏦 Broker</div>
            <div class="tab-btn" onclick="openTab('donasi-tab', this)">☕ Donasi</div>
            <div class="tab-btn" style="color:var(--red)" onclick="logout()">🚪 Exit</div>
        </nav>
    </div>
    <div class="content-container">
        <div id="chart-tab" class="tab-content">
            <div style="background:#0d1117;padding:10px;display:flex;gap:10px;border-bottom:1px solid #1f2937;">
                <input type="text" id="chart-pair" style="background:#0a0e14;border:1px solid #1f2937;color:var(--blue);padding:5px;border-radius:5px;width:100px;font-size:10px;" value="XAUUSD">
                <button onclick="updateChart()" style="background:var(--blue);border:none;padding:5px 10px;border-radius:5px;font-size:10px;font-weight:bold;">SWITCH</button>
            </div>
            <div id="tv_v60" style="height:calc(100% - 45px); width:100%;"></div>
        </div>
        <div id="journal-tab" class="tab-content active"><div class="inner-padding">
            <div id="psy-box" class="psych-alert"><b style="color:var(--red); font-size: 10px;">⚠️ PSYCHOLOGY WARNING!</b><br><small style="font-size: 8px; color:white;">Doms, kamu sedang SL streak. Stop trading, tenangkan diri!</small></div>
            <form id="tradingForm">
                <div class="notion-form">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><div class="form-item"><label>📅 Date</label><input type="date" id="date"></div><div class="form-item"><label>⌚ Time</label><input type="time" id="time"></div></div>
                    <div class="form-item"><label>💰 Pair Selection</label>
                        <select id="pair">
                            <optgroup label="METAL"><option value="XAUUSD">XAUUSD</option><option value="XAGUSD">XAGUSD</option></optgroup>
                            <optgroup label="FOREX MAJOR"><option value="EURUSD">EURUSD</option><option value="GBPUSD">GBPUSD</option><option value="USDJPY">USDJPY</option><option value="AUDUSD">AUDUSD</option><option value="USDCAD">USDCAD</option><option value="USDCHF">USDCHF</option><option value="EURJPY">EURJPY</option><option value="GBPJPY">GBPJPY</option></optgroup>
                            <optgroup label="CRYPTO"><option value="BTCUSD">BTCUSD</option><option value="ETHUSD">ETHUSD</option></optgroup>
                            <optgroup label="INDICES"><option value="US30">US30</option><option value="NAS100">NAS100</option><option value="GER40">GER40</option></optgroup>
                        </select>
                    </div>
                    <div class="form-item" style="border:none;"><label>🕒 Session</label><div class="chip-grid"><div class="chip" onclick="setV('session', 'SYDNEY', this)">SYDNEY</div><div class="chip" onclick="setV('session', 'ASIA', this)">ASIA</div><div class="chip" onclick="setV('session', 'LONDON', this)">LONDON</div><div class="chip" onclick="setV('session', 'NY', this)">NY</div></div></div>
                    <div class="form-item" style="border:none;"><label>🎯 Entry Model</label><div class="entry-model-grid">
                        <label class="check-item"><input type="checkbox" class="model-check" value="QM"> QM</label><label class="check-item"><input type="checkbox" class="model-check" value="FVG"> FVG</label><label class="check-item"><input type="checkbox" class="model-check" value="IFVG"> IFVG</label>
                        <label class="check-item"><input type="checkbox" class="model-check" value="OB"> OB</label><label class="check-item"><input type="checkbox" class="model-check" value="CISD"> CISD</label><label class="check-item"><input type="checkbox" class="model-check" value="PSP"> PSP</label>
                        <label class="check-item"><input type="checkbox" class="model-check" value="SMT"> SMT</label><label class="check-item"><input type="checkbox" class="model-check" value="SSMT"> SSMT</label><label class="check-item"><input type="checkbox" class="model-check" value="SBR"> SBR</label>
                        <label class="check-item"><input type="checkbox" class="model-check" value="RBS"> RBS</label><label class="check-item"><input type="checkbox" class="model-check" value="TS"> TS</label><label class="check-item"><input type="checkbox" class="model-check" value="MSS"> MSS</label><label class="check-item"><input type="checkbox" class="model-check" value="LIQ"> LIQ</label>
                    </div></div>
                    <div class="form-item"><label>😊 Emotion</label><select id="emotion"><option value="Calm">😊 Calm</option><option value="Greedy">🤑 Greedy</option><option value="FOMO">😨 FOMO</option></select></div>
                    <div class="form-item"><label>📝 Reason</label><textarea id="reason" placeholder="Catatan analisa..."></textarea></div>
                    <div class="form-item" style="border:none;"><label>📊 Result</label><div class="chip-grid" style="grid-template-columns:repeat(3, 1fr);"><div class="chip" data-res="TP" onclick="setV('res', 'TP', this)">💰 TP</div><div class="chip" data-res="SL" onclick="setV('res', 'SL', this)">💀 SL</div><div class="chip" onclick="setV('res', 'BE', this)">⚖️ BE</div></div></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><div class="form-item"><label>📈 RR</label><input type="text" id="rr" value="1:3"></div><div class="form-item"><label>💵 P&L ($)</label><input type="number" id="pnl" placeholder="0.00" step="any"></div></div>
                    <div class="photo-grid">
                        <div class="upload-box"><span>📸 Before</span><input type="file" onchange="procImg(this, 'pb')"><img id="pb"></div>
                        <div class="upload-box"><span>📸 After</span><input type="file" onchange="procImg(this, 'pa')"><img id="pa"></div>
                    </div>
                    <button type="button" class="btn-save" id="saveBtn" onclick="save()">🚀 SAVE TRANSACTION</button>
                </div>
            </form>
            <div id="hist"></div>
        </div></div>
        <div id="monitor-tab" class="tab-content"><div class="inner-padding">
            <div class="mon-filters">
                <select id="mon-pair" class="mon-select" onchange="render()"><option value="ALL">ALL PAIRS</option><option value="XAUUSD">XAUUSD</option><option value="XAGUSD">XAGUSD</option><option value="EURUSD">EURUSD</option><option value="GBPUSD">GBPUSD</option><option value="USDJPY">USDJPY</option><option value="AUDUSD">AUDUSD</option><option value="USDCAD">USDCAD</option><option value="USDCHF">USDCHF</option><option value="EURJPY">EURJPY</option><option value="GBPJPY">GBPJPY</option><option value="BTCUSD">BTCUSD</option><option value="ETHUSD">ETHUSD</option><option value="US30">US30</option><option value="NAS100">NAS100</option><option value="GER40">GER40</option></select>
                <select id="mon-month" class="mon-select" onchange="render()"><option value="ALL">ALL TIME</option><option value="01">JANUARI</option><option value="02">FEBRUARI</option><option value="03">MARET</option><option value="04">APRIL</option><option value="05">MEI</option><option value="06">JUNI</option><option value="07">JULI</option><option value="08">AGUSTUS</option><option value="09">SEPTEMBER</option><option value="10">OKTOBER</option><option value="11">NOVEMBER</option><option value="12">DESEMBER</option></select>
            </div>
            <div class="equity-container"><canvas id="equityChart"></canvas></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;"><div class="stat-card" style="background:var(--card);padding:15px;border-radius:15px;text-align:center;"><small>TOTAL P&L</small><br><b id="st-pnl">$ 0.00</b></div><div class="stat-card" style="background:var(--card);padding:15px;border-radius:15px;text-align:center;"><small>WIN RATE</small><br><b id="st-wr">0%</b></div></div>
            <div id="cal" class="calendar-grid"></div>
            <button class="btn-export" onclick="exportCSV()">📥 EXPORT TO CSV (EXCEL)</button>
        </div></div>
    </div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCAXjaw82F1gdZUZfpDi1_9-5-ISU0aDVs", authDomain: "freedomsyndicatecloud.firebaseapp.com", databaseURL: "https://freedomsyndicatecloud-default-rtdb.firebaseio.com", projectId: "freedomsyndicatecloud", storageBucket: "freedomsyndicatecloud.firebasestorage.app", messagingSenderId: "915558934014", appId: "1:915558934014:web:08442d20712f2010f58caf" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), rtdb = firebase.database();
        let curUser = null, sRes = '', sSession = '', bB = '', bA = '', allTrades = [], equityChart = null;

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        auth.onAuthStateChanged(u => { if(u){ curUser = u; document.getElementById('auth-screen').style.display='none'; document.getElementById('display-user').innerText="ACTIVE: "+u.email; loadData(); updateChart(); } else { document.getElementById('auth-screen').style.display='flex'; }});
        function logout() { auth.signOut(); }
        function openTab(id, el) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
        function setV(t, v, el) { el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); if(t === 'res') sRes = v; if(t === 'session') sSession = v; }
        function procImg(i, id) { const r = new FileReader(); r.onload = e => { document.getElementById(id).src = e.target.result; document.getElementById(id).style.display = 'block'; if(id === 'pb') bB = e.target.result; else bA = e.target.result; }; r.readAsDataURL(i.files[0]); }
        
        function save() {
            if(!sRes || !curUser) return alert("Pilih Result!");
            const btn = document.getElementById('saveBtn'); btn.innerText = "🚀 SAVING..."; btn.disabled = true;
            const t = { date: document.getElementById('date').value, time: document.getElementById('time').value, pair: document.getElementById('pair').value, session: sSession || 'N/A', models: Array.from(document.querySelectorAll('.model-check:checked')).map(cb => cb.value), emotion: document.getElementById('emotion').value, reason: document.getElementById('reason').value, rr: document.getElementById('rr').value, pnl: parseFloat(document.getElementById('pnl').value) || 0, res: sRes, bef: bB, aft: bA };
            rtdb.ref('users/' + curUser.uid + '/trades').push(t).then(() => { 
                alert("BERHASIL!"); btn.innerText = "🚀 SAVE TRANSACTION"; btn.disabled = false; 
                document.getElementById('tradingForm').reset(); document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); 
                document.getElementById('pb').style.display = 'none'; document.getElementById('pa').style.display = 'none'; 
                bB = ''; bA = ''; sRes = ''; sSession = ''; initDate();
            });
        }

        function loadData() { rtdb.ref('users/' + curUser.uid + '/trades').on('value', snap => { const d = snap.val(); allTrades = d ? Object.entries(d).map(([id, val]) => ({...val, id})) : []; render(); }); }
        function del(id) { if(confirm("Doms, yakin mau hapus data ini permanen?")) rtdb.ref('users/' + curUser.uid + '/trades/' + id).remove(); }
        function updateChart() { const p = document.getElementById('chart-pair').value.toUpperCase() || 'XAUUSD'; document.getElementById('tv_v60').innerHTML = ''; new TradingView.widget({"autosize": true, "symbol": p, "interval": "15", "timezone": "Asia/Jakarta", "theme": "dark", "style": "1", "container_id": "tv_v60"}); }
        function openZoom(src) { document.getElementById('zoom-target').src = src; document.getElementById('modal-zoom').style.display = 'flex'; }

        function share(id) {
            const t = allTrades.find(x => x.id === id);
            const msg = `FREEDOM SYNDICATE SETUP\nPair: ${t.pair}\nResult: ${t.res}\nModel: ${t.models.join(', ')}\nNote: ${t.reason}`;
            navigator.clipboard.writeText(msg).then(() => alert("Analisa disalin ke clipboard! Siap kirim ke komunitas."));
        }

        function render() {
            const h = document.getElementById('hist'); h.innerHTML = ''; let totalP = 0, win = 0, count = 0;
            const fPair = document.getElementById('mon-pair').value;
            const fMonth = document.getElementById('mon-month').value;
            const sorted = allTrades.sort((a,b) => new Date(b.date + 'T' + (b.time || '00:00')) - new Date(a.date + 'T' + (a.time || '00:00')));
            
            const last5 = sorted.slice(0, 5);
            const slCount = last5.filter(x => x.res === 'SL').length;
            document.getElementById('psy-box').style.display = (slCount >= 3) ? 'block' : 'none';

            let equityData = [0], eqLabels = ["Start"];
            let runningSum = 0;
            const chronSort = [...allTrades].sort((a,b) => new Date(a.date + 'T' + (a.time || '00:00')) - new Date(b.date + 'T' + (b.time || '00:00')));

            chronSort.forEach(t => {
                runningSum += t.pnl;
                equityData.push(runningSum);
                eqLabels.push(t.date.split('-')[2]);
                const tMonth = t.date.split('-')[1];
                if((fPair === 'ALL' || t.pair === fPair) && (fMonth === 'ALL' || tMonth === fMonth)) {
                    totalP += (t.pnl || 0);
                    if(t.res === 'TP') win++;
                    count++;
                }
            });

            sorted.forEach(t => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `<div class="btn-del" onclick="del('${t.id}')">×</div><div class="btn-share" onclick="share('${t.id}')">🔗</div><div style="font-size:10px; color:var(--blue); font-weight:bold;">${t.date} | ${t.pair} <span class="badge badge-session">${t.session || ''}</span></div><div style="font-size:9px; color:#777; margin-bottom:8px;"><b>Mood:</b> ${t.emotion} | <b>Note:</b> ${t.reason || '-'}</div><div class="tracker-display">${t.bef ? `<img class="tracker-img" src="${t.bef}" onclick="openZoom('${t.bef}')">` : ''}${t.aft ? `<img class="tracker-img" src="${t.aft}" onclick="openZoom('${t.aft}')">` : ''}</div><div style="display:flex; justify-content:space-between; margin-top:8px; font-size:10px;"><span style="color:${t.res === 'TP' ? 'var(--green)' : t.res === 'SL' ? 'var(--red)' : 'var(--be)'}">${t.res}: $${t.pnl}</span><span>RR ${t.rr}</span></div>`;
                h.appendChild(card);
            });

            document.getElementById('st-pnl').innerText = `$ ${totalP.toFixed(2)}`;
            document.getElementById('st-wr').innerText = `${count > 0 ? Math.round((win/count)*100) : 0}%`;
            updateEquityChart(eqLabels, equityData);
            renderCal();
        }

        function updateEquityChart(labels, data) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            if(equityChart) equityChart.destroy();
            equityChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ data: data, borderColor: '#38bdf8', borderWidth: 2, tension: 0.3, fill: true, backgroundColor: 'rgba(56, 189, 248, 0.1)', pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#444', font: { size: 8 } } } } }
            });
        }

        function renderCal() {
            const cal = document.getElementById('cal'); cal.innerHTML = '';
            const g = {}; allTrades.forEach(t => { g[t.date] = (g[t.date] || 0) + t.pnl; });
            const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i = 1; i <= daysInMonth; i++) {
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const p = g[ds] || 0;
                const el = document.createElement('div');
                el.className = `cal-day ${p > 0 ? 'profit' : p < 0 ? 'loss' : ''}`;
                el.innerHTML = `<span style="opacity:0.3">${i}</span><b>${p !== 0 ? p.toFixed(0) : ''}</b>`;
                cal.appendChild(el);
            }
        }

        function exportCSV() {
            let csv = "Date,Time,Pair,Session,Model,Emotion,Result,P&L,RR,Reason\n";
            allTrades.forEach(t => { csv += `${t.date},${t.time},${t.pair},${t.session},"${t.models ? t.models.join('|') : '-'}",${t.emotion},${t.res},${t.pnl},${t.rr},"${t.reason}"\n`; });
            const b = new Blob([csv], { type: 'text/csv' }); const u = window.URL.createObjectURL(b); const a = document.createElement('a');
            a.setAttribute('href', u); a.setAttribute('download', `FS_Journal_${new Date().toISOString().slice(0,10)}.csv`); a.click();
        }

        function initDate() { const n = new Date(); document.getElementById('date').value = n.toISOString().split('T')[0]; document.getElementById('time').value = n.toTimeString().slice(0,5); }
        window.onload = initDate;
    </script>
</body>
</html>
