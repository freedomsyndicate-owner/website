<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS | Freedom Syndicate Cloud V60</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --blue: #38bdf8; --red: #ef4444; --green: #4ade80; --bg: #050a14; --card: #0d1117; --be: #eab308; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 20px; border: 1px solid #1f2937; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(56, 189, 248, 0.1); }
        @keyframes textGlow { 0%, 100% { text-shadow: 0 0 10px var(--blue); transform: translateY(0); } 50% { text-shadow: 0 0 25px var(--blue), 0 0 40px var(--blue); transform: translateY(-5px); } }
        .auth-logo-main { font-family: 'Orbitron'; font-size: 1.4rem; color: white; margin: 0; letter-spacing: 2px; animation: textGlow 3s infinite ease-in-out; }
        .auth-logo-sub { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--blue); margin: 5px 0 30px 0; letter-spacing: 8px; font-weight: 300; text-transform: uppercase; }
        .auth-card input { width: 100%; background: #0a0e14; border: 1px solid #1f2937; padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn-auth { width: 100%; background: var(--blue); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }
        .fixed-top { flex-shrink: 0; padding: 15px 10px 5px 10px; background: var(--bg); z-index: 100; text-align: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 2px; text-shadow: 0 0 10px var(--blue); margin: 0; }
        .nav-tabs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 15px; }
        .tab-btn { cursor: pointer; background: var(--card); border: 1px solid #1f2937; padding: 10px 2px; border-radius: 10px; font-size: 6px; font-weight: bold; color: #9ca3af; text-transform: uppercase; text-align: center; }
        .tab-btn.active { border-color: var(--blue); color: white; background: rgba(56, 189, 248, 0.1); }
        .content-container { flex-grow: 1; position: relative; overflow: hidden; }
        .tab-content { display: none; width: 100%; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .tab-content.active { display: block; }
        .inner-padding { padding: 15px; padding-bottom: 150px; }
        .notion-form { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1f2937; margin-bottom: 25px; }
        .form-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .form-item label { font-size: 9px; color: #777; text-transform: uppercase; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
        .form-item select, .form-item input, .form-item textarea { background: transparent; border: none; color: white; width: 100%; font-size: 13px; outline: none; padding: 5px 0; font-family: 'Poppins'; }
        .chip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .chip { text-align: center; padding: 8px 2px; border-radius: 6px; background: #111827; border: 1px solid #1f2937; font-size: 8px; font-weight: bold; cursor: pointer; color: #555; }
        .chip.active { border-color: var(--blue); color: white; background: rgba(56, 189, 248, 0.1); }
        .chip.active[data-res="TP"] { border-color: var(--green); color: var(--green); }
        .chip.active[data-res="SL"] { border-color: var(--red); color: var(--red); }
        .entry-model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #ffffff !important; cursor: pointer; }
        .check-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--blue); cursor: pointer; margin: 0; }
        .upload-box { background: #0a0e14; border: 1px dashed #333; border-radius: 12px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-top: 10px; }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .btn-save { width: 100%; background: var(--blue); color: black; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; }
        .history-card { background: #0a0e14; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #1f2937; position: relative; }
        .tracker-display { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .tracker-img { width: 100%; aspect-ratio: 16/9; background: #111827; border-radius: 8px; border: 1px solid #333; object-fit: cover; }
        .btn-del { position: absolute; top: 12px; right: 12px; color: var(--red); font-weight: bold; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1/1.2; background: #111827; border-radius: 6px; font-size: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #1f2937; }
        .cal-day.profit { border-color: var(--green); color: var(--green); }
        .cal-day.loss { border-color: var(--red); color: var(--red); }
        .chart-container { background: var(--card); border-radius: 15px; border: 1px solid #1f2937; padding: 10px; margin-top: 20px; height: 150px; }
        .broker-card { background: var(--card); border: 1px solid #1f2937; border-radius: 15px; padding: 20px; margin-bottom: 15px; text-decoration: none; display: block; color: white; }
        .btn-reg { background: var(--blue); color: black; border: none; padding: 8px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 10px; margin-top: 12px; font-family: 'Orbitron'; cursor: pointer; }
        .donation-box { background: var(--card); border: 1px solid #1f2937; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 30px; }
        .qris-img { width: 100%; max-width: 280px; border-radius: 15px; margin: 20px 0; border: 5px solid white; display: block; margin-left: auto; margin-right: auto; }
        .support-btn { background: #ffdd00; color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-card">
            <h1 class="auth-logo-main">FREEDOM SYNDICATE</h1>
            <div class="auth-logo-sub">Journal</div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn-auth" onclick="handleAuth()">LOGIN / DAFTAR</button>
        </div>
    </div>
    <div class="fixed-top"><h1 class="logo">FREEDOM SYNDICATE</h1><div id="display-user" style="font-size: 7px; color: #444; margin-top: 5px;"></div><nav class="nav-tabs">
        <div class="tab-btn" onclick="openTab('chart-tab', this)">📈 Chart</div>
        <div class="tab-btn active" onclick="openTab('journal-tab', this)">📓 Journal</div>
        <div class="tab-btn" onclick="openTab('monitor-tab', this)">🖥️ Monitor</div>
        <div class="tab-btn" onclick="openTab('broker-tab', this)">🏦 Broker</div>
        <div class="tab-btn" onclick="openTab('donasi-tab', this)">☕ Donasi</div>
        <div class="tab-btn" style="color:var(--red)" onclick="logout()">🚪 Exit</div>
    </nav></div>
    <div class="content-container">
        <div id="chart-tab" class="tab-content">
            <div style="background:#0d1117;padding:10px;display:flex;gap:10px;border-bottom:1px solid #1f2937;">
                <input type="text" id="chart-pair" style="background:#0a0e14;border:1px solid #1f2937;color:var(--blue);padding:5px;border-radius:5px;width:100px;font-size:10px;" placeholder="XAUUSD" value="XAUUSD">
                <button onclick="updateChart()" style="background:var(--blue);border:none;padding:5px 10px;border-radius:5px;font-size:10px;font-weight:bold;">SWITCH PAIR</button>
            </div>
            <div id="tv_v60" style="height:calc(100% - 45px); width:100%;"></div>
        </div>
        <div id="journal-tab" class="tab-content active"><div class="inner-padding"><div class="notion-form">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><div class="form-item"><label>📅 Date</label><input type="date" id="date"></div><div class="form-item"><label>⌚ Time</label><input type="time" id="time"></div></div>
            <div class="form-item"><label>💰 Pair Selection</label>
                <select id="pair">
                    <optgroup label="METAL"><option value="XAUUSD">XAUUSD</option><option value="XAGUSD">XAGUSD</option></optgroup>
                    <optgroup label="FOREX MAJOR"><option value="EURUSD">EURUSD</option><option value="GBPUSD">GBPUSD</option><option value="USDJPY">USDJPY</option><option value="AUDUSD">AUDUSD</option><option value="USDCAD">USDCAD</option><option value="USDCHF">USDCHF</option></optgroup>
                    <optgroup label="CRYPTO"><option value="BTCUSD">BTCUSD</option><option value="ETHUSD">ETHUSD</option></optgroup>
                    <optgroup label="INDICES"><option value="US30">US30</option><option value="NAS100">NAS100</option></optgroup>
                </select>
            </div>
            <div class="form-item" style="border:none;"><label>🕒 Session</label><div class="chip-grid"><div class="chip" onclick="setV('session', 'SYDNEY', this)">SYDNEY</div><div class="chip" onclick="setV('session', 'ASIA', this)">ASIA</div><div class="chip" onclick="setV('session', 'LONDON', this)">LONDON</div><div class="chip" onclick="setV('session', 'NY', this)">NY</div></div></div>
            <div class="form-item" style="border:none;"><label>🎯 Entry Model</label><div class="entry-model-grid">
                <label class="check-item"><input type="checkbox" class="model-check" value="QM"> QM</label><label class="check-item"><input type="checkbox" class="model-check" value="FVG"> FVG</label><label class="check-item"><input type="checkbox" class="model-check" value="OB"> OB</label>
                <label class="check-item"><input type="checkbox" class="model-check" value="CISD"> CISD</label><label class="check-item"><input type="checkbox" class="model-check" value="PSP"> PSP</label><label class="check-item"><input type="checkbox" class="model-check" value="SMT"> SMT</label>
                <label class="check-item"><input type="checkbox" class="model-check" value="SSMT"> SSMT</label><label class="check-item"><input type="checkbox" class="model-check" value="SBR"> SBR</label><label class="check-item"><input type="checkbox" class="model-check" value="RBS"> RBS</label>
                <label class="check-item"><input type="checkbox" class="model-check" value="TS"> TS</label><label class="check-item"><input type="checkbox" class="model-check" value="MSS"> MSS</label><label class="check-item"><input type="checkbox" class="model-check" value="LIQ"> LIQ</label>
            </div></div>
            <div class="form-item"><label>😊 Emotion</label><select id="emotion"><option value="Calm">😊 Calm</option><option value="Greedy">🤑 Greedy</option><option value="FOMO">😨 FOMO</option></select></div>
            <div class="form-item"><label>📝 Reason Entry</label><textarea id="reason" placeholder="Catatan analisa..."></textarea></div>
            <div class="form-item" style="border:none;"><label>📊 Result</label><div class="chip-grid" style="grid-template-columns:repeat(3, 1fr);"><div class="chip" data-res="TP" onclick="setV('res', 'TP', this)">💰 TP</div><div class="chip" data-res="SL" onclick="setV('res', 'SL', this)">💀 SL</div><div class="chip" onclick="setV('res', 'BE', this)">⚖️ BE</div></div></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><div class="form-item"><label>📈 RR</label><input type="text" id="rr" value="1:3"></div><div class="form-item"><label>💵 P&L ($)</label><input type="number" id="pnl" placeholder="0.00"></div></div>
            <div class="photo-grid">
                <div class="upload-box"><span>📸 Before</span><input type="file" onchange="procImg(this, 'pb')"><img id="pb" style="display:none"></div>
                <div class="upload-box"><span>📸 After</span><input type="file" onchange="procImg(this, 'pa')"><img id="pa" style="display:none"></div>
            </div>
            <button class="btn-save" id="saveBtn" onclick="save()">🚀 SAVE TRANSACTION</button>
        </div><div id="hist"></div></div></div>
        <div id="monitor-tab" class="tab-content"><div class="inner-padding">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;"><div class="stat-card" style="background:var(--card);padding:15px;border-radius:15px;text-align:center;"><small>TOTAL P&L</small><br><b id="st-pnl">$ 0.00</b></div><div class="stat-card" style="background:var(--card);padding:15px;border-radius:15px;text-align:center;"><small>WIN RATE</small><br><b id="st-wr">0%</b></div></div>
            <div id="cal" class="calendar-grid"></div>
            <div class="chart-container"><small style="color:#777; font-size:10px; text-transform: uppercase;">📈 Daily Equity Curve</small><canvas id="harvestChart"></canvas></div>
        </div></div>
        <div id="broker-tab" class="tab-content"><div class="inner-padding">
            <div class="broker-card"><h3>EXNESS</h3><button class="btn-reg" onclick="window.open('https://one.exnessonelink.com/a/f4ntqgcba4', '_blank')">DAFTAR EXNESS</button></div>
            <div class="broker-card"><h3>HEADWAY</h3><button class="btn-reg" onclick="window.open('https://headway.partners/user/signup?hwp=7c27db', '_blank')">DAFTAR HEADWAY</button></div>
        </div></div>
        <div id="donasi-tab" class="tab-content"><div class="inner-padding"><div class="donation-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=00020101021126570011ID.DANA.WWW011893600915309951702702090995170270303UMI51440014ID.CO.QRIS.WWW0215ID10200585900400303UMI5204549953033605802ID5912WARUNG%20LISAN6013Kab.%20Ponorogo6105634126304F35C" class="qris-img" alt="QRIS"><button class="support-btn" onclick="alert('Terima kasih!')">🚀 DUKUNG!</button></div></div></div>
    </div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCAXjaw82F1gdZUZfpDi1_9-5-ISU0aDVs", authDomain: "freedomsyndicatecloud.firebaseapp.com", databaseURL: "https://freedomsyndicatecloud-default-rtdb.firebaseio.com", projectId: "freedomsyndicatecloud", storageBucket: "freedomsyndicatecloud.firebasestorage.app", messagingSenderId: "915558934014", appId: "1:915558934014:web:08442d20712f2010f58caf" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), rtdb = firebase.database();
        let curUser = null, sRes = '', sSession = '', bB = '', bA = '', harvestChart = null;

        function updateChart() {
            const p = document.getElementById('chart-pair').value.toUpperCase() || 'XAUUSD';
            document.getElementById('tv_v60').innerHTML = '';
            new TradingView.widget({"autosize": true, "symbol": p, "interval": "15", "timezone": "Asia/Jakarta", "theme": "dark", "style": "1", "container_id": "tv_v60"});
        }
        auth.onAuthStateChanged(u => { if(u){ curUser = u; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('display-user').innerText = "ACTIVE: " + u.email; loadData(); updateChart(); } else { document.getElementById('auth-screen').style.display = 'flex'; }});
        function handleAuth() { const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value; if(!e || !p) return alert("Isi data!"); auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        function logout() { auth.signOut(); }
        function openTab(id, el) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); if(id === 'chart-tab') updateChart(); }
        function setV(t, v, el) { el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); if(t === 'res') sRes = v; if(t === 'session') sSession = v; }
        
        function procImg(i, id) { 
            const f = i.files[0]; if(!f) return; 
            const r = new FileReader(); r.readAsDataURL(f); 
            r.onload = e => { 
                const img = new Image(); img.src = e.target.result; 
                img.onload = () => { 
                    const cvs = document.createElement('canvas'); const sc = Math.min(500 / img.width, 1); 
                    cvs.width = img.width * sc; cvs.height = img.height * sc; 
                    cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height); 
                    const b64 = cvs.toDataURL('image/jpeg', 0.4); 
                    document.getElementById(id).src = b64; document.getElementById(id).style.display = 'block'; 
                    if(id === 'pb') bB = b64; else bA = b64; 
                }; 
            }; 
        }
        
        function save() { 
            if(!sRes || !curUser) return alert("Pilih Result!"); 
            const btn = document.getElementById('saveBtn'); btn.innerText = "🚀 SAVING..."; btn.disabled = true; 
            const t = { 
                date: document.getElementById('date').value, 
                time: document.getElementById('time').value, 
                pair: document.getElementById('pair').value, 
                session: sSession, 
                models: Array.from(document.querySelectorAll('.model-check:checked')).map(cb => cb.value), 
                emotion: document.getElementById('emotion').value, 
                reason: document.getElementById('reason').value, 
                rr: document.getElementById('rr').value, 
                pnl: parseFloat(document.getElementById('pnl').value) || 0, 
                res: sRes, bef: bB, aft: bA 
            }; 
            rtdb.ref('users/' + curUser.uid + '/trades').push(t)
            .then(() => { 
                alert("BERHASIL DISIMPAN!"); 
                btn.innerText = "🚀 SAVE TRANSACTION"; btn.disabled = false; 
                // RESET FORM OTOMATIS
                document.getElementById('pnl').value = '0.00';
                document.getElementById('reason').value = '';
                document.querySelectorAll('.model-check').forEach(cb => cb.checked = false);
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                sRes = ''; sSession = ''; bB = ''; bA = '';
                document.getElementById('pb').style.display='none'; document.getElementById('pa').style.display='none';
            })
            .catch(e => { alert(e.message); btn.innerText = "🚀 SAVE TRANSACTION"; btn.disabled = false; });
        }
        
        function loadData() { rtdb.ref('users/' + curUser.uid + '/trades').on('value', snap => { const d = snap.val(); render(d ? Object.entries(d).map(([id, val]) => ({...val, id})) : []); }); }
        function del(id) { if(confirm("Hapus?")) rtdb.ref('users/' + curUser.uid + '/trades/' + id).remove(); }
        
        function render(trades) {
            const h = document.getElementById('hist'); h.innerHTML = ''; let totalP = 0, win = 0;
            const sorted = trades.sort((a,b) => new Date(b.date+' '+b.time) - new Date(a.date+' '+a.time));
            sorted.forEach(t => {
                totalP += t.pnl; if(t.res === 'TP') win++;
                const card = document.createElement('div'); card.className = 'history-card';
                card.innerHTML = `<div class="btn-del" onclick="del('${t.id}')">✕</div><div style="font-size:10px; color:var(--blue); font-weight:bold;">${t.date} ${t.time || ''} | ${t.pair} (${t.res})</div><div class="tracker-display">${t.bef ? `<img src="${t.bef}" class="tracker-img">` : ''}${t.aft ? `<img src="${t.aft}" class="tracker-img">` : ''}</div>`;
                h.appendChild(card);
            });
            document.getElementById('st-pnl').innerText = `$ ${totalP.toFixed(2)}`;
            document.getElementById('st-wr').innerText = trades.length ? Math.round((win / trades.length) * 100) + "%" : "0%";
            updateCalendar(trades); updateEquity(trades);
        }

        function updateCalendar(trades) {
            const cal = document.getElementById('cal'); if(!cal) return; cal.innerHTML = ''; const days = {};
            trades.forEach(t => { if(!days[t.date]) days[t.date] = 0; days[t.date] += t.pnl; });
            const today = new Date();
            for(let i=0; i<14; i++) {
                const d = new Date(); d.setDate(today.getDate() - i); 
                const ds = d.toISOString().split('T')[0]; const pnl = days[ds] || 0;
                const div = document.createElement('div'); div.className = `cal-day ${pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : ''}`;
                div.innerHTML = `<span>${d.getDate()}</span><b style="font-size:6px">${pnl !== 0 ? pnl.toFixed(0) : ''}</b>`;
                cal.prepend(div);
            }
        }

        function updateEquity(trades) {
            const chartEl = document.getElementById('harvestChart'); if(!chartEl) return;
            const ctx = chartEl.getContext('2d'); if(harvestChart) harvestChart.destroy();
            let sum = 0; const sorted = trades.sort((a,b) => new Date(a.date+' '+a.time) - new Date(b.date+' '+b.time));
            const data = sorted.map(t => { sum += t.pnl; return sum; });
            harvestChart = new Chart(ctx, { type: 'line', data: { labels: data.map((_,i) => i+1), datasets: [{ data: data, borderColor: '#38bdf8', tension: 0.4, fill: true, backgroundColor: 'rgba(56,189,248,0.1)' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#1f2937' }, ticks: { color: '#444', font: { size: 8 } } } } } });
        }
    </script>
</body>
</html>
