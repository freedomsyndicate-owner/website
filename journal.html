<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS | Freedom Syndicate V69 PREMIUM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --blue: #38bdf8; --red: #ef4444; --green: #4ade80; --bg: #050a14; --card: #0d1117; --be: #eab308; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: #0a0e14; z-index: 2000; transition: 0.3s; border-right: 1px solid #1f2937; padding: 20px; }
        #sidebar.open { left: 0; }
        .side-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; display: none; backdrop-filter: blur(4px); }
        .side-overlay.show { display: block; }
        .side-link { padding: 15px; color: #9ca3af; font-weight: bold; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 13px; }
        .side-link.active { background: rgba(56, 189, 248, 0.1); color: white; border-left: 4px solid var(--blue); }

        .fixed-top { padding: 15px; background: var(--bg); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .content-container { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .notion-form { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1f2937; }
        .form-item { margin-bottom: 18px; }
        .form-item label { font-size: 10px; color: var(--blue); text-transform: uppercase; font-weight: 900; display: block; margin-bottom: 8px; }
        .form-item select, .form-item input, .form-item textarea { background: #050a14; border: 1px solid #1f2937; color: white; width: 100%; font-size: 13px; border-radius: 10px; padding: 12px; outline: none; box-sizing: border-box; }
        
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .chip { text-align: center; padding: 10px 5px; border-radius: 8px; background: #111827; border: 1px solid #1f2937; font-size: 9px; font-weight: bold; cursor: pointer; color: #666; }
        .chip.active { border-color: var(--blue); color: white; background: rgba(56, 189, 248, 0.2); }

        .poi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #0a0e14; padding: 15px; border-radius: 12px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #ccc; }
        .check-item input { accent-color: var(--blue); }

        .history-card { background: #0a0e14; border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #1f2937; position: relative; }
        .h-tag { font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }
        .h-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; background: #050a14; padding: 10px; border-radius: 8px; font-size: 9px; color: #9ca3af; }
        .h-reason { font-size: 11px; margin-top: 10px; color: #fff; line-height: 1.4; border-top: 1px solid #1f2937; padding-top: 8px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--blue); text-align:center;">FS MENU</h2>
        <div class="side-link" onclick="openTab('chart-tab')">📈 CHART</div>
        <div class="side-link active" onclick="openTab('journal-tab')">📓 JOURNAL</div>
        <div class="side-link" onclick="openTab('monitor-tab')">🖥️ PERFORMANCE</div>
    </div>
    <div class="side-overlay" onclick="toggleMenu()"></div>

    <div class="fixed-top">
        <div onclick="toggleMenu()" style="font-size:24px; color:var(--blue);">☰</div>
        <h1 style="font-family:'Orbitron'; font-size:14px; margin:0;">FREEDOM SYNDICATE</h1>
        <div></div>
    </div>

    <div class="content-container">
        <div id="journal-tab" class="tab-content active">
            <form id="tradingForm" class="notion-form" onsubmit="return false;">
                <div class="form-item"><label>📅 DATE</label><input type="date" id="date"></div>
                
                <div class="form-item"><label>💰 PAIR SELECTION</label>
                    <select id="pair">
                        <optgroup label="METAL"><option value="XAUUSD">XAUUSD (GOLD)</option></optgroup>
                        <optgroup label="MAJOR FOREX"><option value="EURUSD">EURUSD</option><option value="GBPUSD">GBPUSD</option><option value="USDJPY">USDJPY</option><option value="AUDUSD">AUDUSD</option></optgroup>
                        <optgroup label="INDICES"><option value="NAS100">NAS100</option><option value="US30">US30</option><option value="GER40">GER40</option></optgroup>
                        <optgroup label="CRYPTO"><option value="BTCUSD">BITCOIN</option><option value="ETHUSD">ETHEREUM</option></optgroup>
                    </select>
                </div>

                <div class="form-item"><label>🕒 SESSION</label>
                    <div class="chip-grid">
                        <div class="chip" onclick="setV('session', 'ASIA', this)">ASIA</div>
                        <div class="chip" onclick="setV('session', 'LONDON', this)">LONDON</div>
                        <div class="chip" onclick="setV('session', 'NY', this)">NY</div>
                    </div>
                </div>

                <div class="form-item"><label>⚡ ENTRY MODEL</label>
                    <div class="chip-grid">
                        <div class="chip" onclick="setV('style', 'AGRESIF', this)">AGRESIF</div>
                        <div class="chip" onclick="setV('style', 'CONFIRM', this)">CONFIRM</div>
                        <div class="chip" onclick="setV('style', 'RE-ENTRY', this)">RE-ENTRY</div>
                    </div>
                </div>

                <div class="form-item"><label>🎯 POI / CONFLUENCE</label>
                    <div class="poi-grid">
                        <label class="check-item"><input type="checkbox" class="poi-check" value="AMD"> AMD</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="SMT"> SMT</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="FVG"> FVG</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="OB"> OB</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="MSS"> MSS</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="BOS"> BOS</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="LIQUIDITY"> LIQ</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="CISD"> CISD</label>
                        <label class="check-item"><input type="checkbox" class="poi-check" value="MACRO"> MACRO</label>
                    </div>
                </div>

                <div class="form-item"><label>🧠 EMOTION</label>
                    <div class="chip-grid">
                        <div class="chip" onclick="setV('emo', 'CALM', this)">CALM</div>
                        <div class="chip" onclick="setV('emo', 'FOMO', this)">FOMO</div>
                        <div class="chip" onclick="setV('emo', 'GREEDY', this)">GREEDY</div>
                    </div>
                </div>

                <div class="form-item"><label>📝 REASON & NOTES</label><textarea id="reason" placeholder="Kenapa lu entry di sini babi? Jelaskan..."></textarea></div>

                <div class="form-item"><label>📊 RESULT</label>
                    <div class="chip-grid">
                        <div class="chip" onclick="setV('res', 'TP', this)">💰 TP</div>
                        <div class="chip" onclick="setV('res', 'SL', this)">💀 SL</div>
                        <div class="chip" onclick="setV('res', 'BE', this)">⚖️ BE</div>
                    </div>
                </div>

                <div class="form-item"><label>💵 P&L ($)</label><input type="number" id="pnl" placeholder="Contoh: 50.5"></div>
                <button type="button" class="btn-save" onclick="save()" style="width:100%; background:var(--blue); color:black; border:none; padding:18px; border-radius:12px; font-weight:900; font-family:'Orbitron';">🚀 SAVE JOURNAL</button>
            </form>
            <div id="hist"></div>
        </div>
    </div>
        <script>
        const firebaseConfig = { apiKey: "AIzaSyCAXjaw82F1gdZUZfpDi1_9-5-ISU0aDVs", authDomain: "freedomsyndicatecloud.firebaseapp.com", databaseURL: "https://freedomsyndicatecloud-default-rtdb.firebaseio.com", projectId: "freedomsyndicatecloud", storageBucket: "freedomsyndicatecloud.firebasestorage.app", appId: "1:915558934014:web:08442d20712f2010f58caf" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), rtdb = firebase.database();
        let curU = null, sRes = '', sSession = '', sStyle = '', sEmo = '';

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.querySelector('.side-overlay').classList.toggle('show'); }
        function openTab(id) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMenu(); }
        function setV(t, v, el) { el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); if(t==='res') sRes = v; if(t==='session') sSession = v; if(t==='style') sStyle = v; if(t==='emo') sEmo = v; }

        auth.onAuthStateChanged(u => { if(u) { curU = u; load(); } else { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } });

        function save() {
            if(!sRes || !curU) return alert("Woi! Pilih TP/SL dulu!");
            const pois = Array.from(document.querySelectorAll('.poi-check:checked')).map(c => c.value);
            const data = {
                date: document.getElementById('date').value,
                pair: document.getElementById('pair').value,
                session: sSession || 'N/A',
                model: sStyle || 'N/A',
                emotion: sEmo || 'N/A',
                poi: pois.join(', ') || 'No POI',
                reason: document.getElementById('reason').value || 'Tanpa keterangan',
                pnl: parseFloat(document.getElementById('pnl').value) || 0,
                res: sRes
            };
            rtdb.ref('users/' + curU.uid + '/trades').push(data).then(() => { 
                alert("BERHASIL SAVE!"); 
                document.getElementById('tradingForm').reset();
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                sRes = ''; sSession = ''; sStyle = ''; sEmo = '';
            });
        }

        function load() {
            rtdb.ref('users/' + curU.uid + '/trades').on('value', snap => {
                const hist = document.getElementById('hist');
                hist.innerHTML = '<h3 style="font-family:Orbitron; margin-top:30px;">HISTORY</h3>';
                if(!snap.val()) return;
                Object.entries(snap.val()).reverse().forEach(([id, t]) => {
                    const color = t.res === 'TP' ? 'var(--green)' : t.res === 'SL' ? 'var(--red)' : 'var(--be)';
                    const div = document.createElement('div');
                    div.className = 'history-card';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${t.date} | ${t.pair}</b>
                            <span class="h-tag" style="background:${color}; color:black;">${t.res} ($${t.pnl})</span>
                        </div>
                        <div class="h-details">
                            <div>🕒 SES: ${t.session}</div>
                            <div>⚡ MOD: ${t.model}</div>
                            <div>🧠 EMO: ${t.emotion}</div>
                            <div>🎯 POI: ${t.poi}</div>
                        </div>
                        <div class="h-reason"><b>Notes:</b> ${t.reason}</div>
                        <button onclick="del('${id}')" style="background:none; border:none; color:var(--red); font-size:10px; margin-top:10px; cursor:pointer;">HAPUS DATA</button>
                    `;
                    hist.appendChild(div);
                });
            });
        }
        function del(id) { if(confirm("Hapus trade ini?")) rtdb.ref('users/' + curU.uid + '/trades/' + id).remove(); }
    </script>
</body>
</html>
