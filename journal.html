<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS | Freedom Syndicate V68 PREMIUM SECURE</title>
    
    <script>
        // === SUPER SECURITY ===
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'S'.charCodeAt(0) || e.keyCode == 'A'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0)))) {
                return false;
            }
        };
        // Clean alerts
        window.alert = function(message) {
            const iframe = document.createElement('iframe'); iframe.style.display = 'none'; iframe.setAttribute('src', 'data:text/plain,');
            document.documentElement.appendChild(iframe); iframe.contentWindow.alert(message); document.documentElement.removeChild(iframe);
        };
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --blue: #38bdf8; --red: #ef4444; --green: #4ade80; --bg: #050a14; --card: #0d1117; --be: #eab308; }
        
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input, textarea, select { -webkit-user-select: text; user-select: text; outline: none; }

        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 24px; border: 1px solid #1f2937; width: 100%; max-width: 380px; text-align: center; }
        .btn-google { width: 100%; background: white; color: #444; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 30px; }

        /* SIDEBAR */
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: #0a0e14; z-index: 2000; transition: 0.3s; border-right: 1px solid #1f2937; padding: 20px; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        .side-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; display: none; backdrop-filter: blur(4px); }
        .side-overlay.show { display: block; }
        .side-link { padding: 15px; color: #9ca3af; font-weight: 600; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 13px; }
        .side-link.active { background: rgba(56, 189, 248, 0.1); color: white; border-left: 4px solid var(--blue); }
        .side-link.logout { color: var(--red); margin-top: auto; border-top: 1px solid #1f2937; padding-top: 20px; }

        /* HEADER */
        .fixed-top { flex-shrink: 0; padding: 15px; background: var(--bg); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; z-index: 100; }
        .menu-toggle { font-size: 24px; cursor: pointer; color: var(--blue); width: 40px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; text-shadow: 0 0 10px var(--blue); margin: 0; flex-grow: 1; text-align: center; }

        .content-container { flex-grow: 1; overflow-y: auto; position: relative; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .inner-padding { padding: 15px; padding-bottom: 120px; }

        /* JOURNAL STYLING */
        .lot-calc-box { background: #0d1117; border: 1px solid var(--be); border-radius: 20px; padding: 18px; margin-bottom: 25px; }
        .lot-input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .lot-input-item input { background: #050a14; border: 1px solid #30363d; color: white; border-radius: 8px; padding: 10px; width: 100%; font-size: 11px; }
        .lot-result-block { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: center; margin-top: 15px; padding: 10px; background: rgba(234, 179, 8, 0.05); border-radius: 10px; }

        .notion-form { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1f2937; margin-bottom: 25px; }
        .form-item { margin-bottom: 15px; }
        .form-item label { font-size: 9px; color: #777; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .chip { text-align: center; padding: 12px 5px; border-radius: 10px; background: #111827; border: 1px solid #1f2937; font-size: 9px; font-weight: bold; cursor: pointer; color: #555; }
        .chip.active { border-color: var(--blue); color: white; background: rgba(56, 189, 248, 0.1); }
        
        /* FIX BEFORE AFTER LAYOUT */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .upload-box { background: #0a0e14; border: 1px dashed #333; border-radius: 15px; padding: 15px; text-align: center; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .upload-box label { font-size: 10px; color: var(--blue); margin-bottom: 10px; font-weight: 900; }
        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-box img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 5px; display: none; border: 1px solid #333; }

        .btn-save { width: 100%; background: var(--blue); color: black; border: none; padding: 18px; border-radius: 14px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; }

        /* MONITOR STYLING */
        .mon-select { background: #0d1117; border: 1px solid #1f2937; color: white; padding: 10px; border-radius: 10px; flex-grow: 1; font-size: 11px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--card); border: 1px solid #1f2937; border-radius: 16px; padding: 15px; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 20px; }
        .cal-day { aspect-ratio: 1/1.2; background: #111827; border-radius: 6px; font-size: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #1f2937; }
        .cal-day.profit { border-color: var(--green); color: var(--green); }
        .cal-day.loss { border-color: var(--red); color: var(--red); }

        /* HISTORY */
        .history-card { background: #0a0e14; border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid #1f2937; position: relative; }
        .h-header { font-size: 10px; font-weight: bold; border-bottom: 1px solid #1f2937; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .tracker-display { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .tracker-img { width: 100%; aspect-ratio: 16/9; background: #111827; border-radius: 8px; object-fit: cover; border: 1px solid #333; }
        .btn-del { position: absolute; top: 12px; right: 12px; color: #444; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="text-align:center; padding: 20px 0;">
            <h2 style="font-family:'Orbitron'; color:var(--blue); font-size: 1rem; margin:0;">FS MENU</h2>
            <div id="display-user" style="font-size: 8px; color: #444; margin-top: 10px;"></div>
        </div>
        <div class="side-link" onclick="openTab('announce-tab', this)">📢 NEWS</div>
        <div class="side-link" onclick="openTab('chart-tab', this)">📈 CHART</div>
        <div class="side-link active" onclick="openTab('journal-tab', this)">📓 JOURNAL</div>
        <div class="side-link" onclick="openTab('monitor-tab', this)">🖥️ PERFORMANCE</div>
        <div class="side-link" onclick="openTab('community-tab', this)">👥 COMMUNITY</div>
        <div class="side-link" onclick="openTab('broker-tab', this)">🏦 BROKER</div>
        <div class="side-link" onclick="openTab('donasi-tab', this)">☕ DONATION</div>
        <div class="side-link logout" onclick="logout()">🚪 LOGOUT</div>
    </div>
    <div class="side-overlay" onclick="toggleMenu()"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="font-family:'Orbitron'; color:white; font-size:1.2rem; margin:0;">FREEDOM SYNDICATE</h1>
            <button class="btn-google" onclick="login()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> LOGIN GOOGLE</button>
        </div>
    </div>

    <div class="fixed-top">
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <h1 class="logo">FREEDOM SYNDICATE</h1>
        <div style="width:40px;"></div>
    </div>

    <div class="content-container">
        <div id="journal-tab" class="tab-content active"><div class="inner-padding">
            <div class="lot-calc-box">
                <div class="lot-input-grid">
                    <div class="lot-input-item"><input type="number" id="calc-bal" placeholder="BAL $" oninput="calcLot()"></div>
                    <div class="lot-input-item"><input type="number" id="calc-risk" placeholder="RISK %" oninput="calcLot()"></div>
                    <div class="lot-input-item"><input type="number" id="calc-sl" placeholder="SL PIPS" oninput="calcLot()"></div>
                </div>
                <div class="lot-result-block">
                    <div><small>Lot:</small><br><b id="res-lot" style="color:var(--be)">0.00</b></div>
                    <div><small>Risk $:</small><br><b id="res-margin" style="color:var(--blue)">0.00</b></div>
                </div>
            </div>
            
            <form id="tradingForm" class="notion-form" onsubmit="return false;">
                <div class="form-item"><label>Date</label><input type="date" id="date" style="background:#050a14; border:1px solid #1f2937; color:white; padding:10px; width:100%; border-radius:10px;"></div>
                
                <div class="form-item"><label>Pair Selection</label>
                    <select id="pair" style="background:#050a14; border:1px solid #1f2937; color:white; padding:12px; width:100%; border-radius:10px;">
                        <option value="XAUUSD">XAUUSD (GOLD)</option>
                        <option value="BTCUSD">BTCUSD (BITCOIN)</option>
                        <option value="ETHUSD">ETHUSD (ETHEREUM)</option>
                        <option value="EURUSD">EURUSD</option>
                        <option value="GBPUSD">GBPUSD</option>
                        <option value="AUDUSD">AUDUSD</option>
                        <option value="USDJPY">USDJPY</option>
                        <option value="NAS100">NAS100 (NASDAQ)</option>
                        <option value="US30">US30 (DOW JONES)</option>
                        <option value="USOIL">USOIL (WTI)</option>
                    </select>
                </div>

                <div class="form-item"><label>Session</label><div class="chip-grid">
                    <div class="chip" onclick="setV('session', 'ASIA', this)">ASIA</div>
                    <div class="chip" onclick="setV('session', 'LONDON', this)">LONDON</div>
                    <div class="chip" onclick="setV('session', 'NY', this)">NY</div>
                </div></div>

                <div class="form-item"><label>POI ICT</label><div class="chip-grid" style="grid-template-columns: repeat(4, 1fr);">
                    <div class="chip" onclick="this.classList.toggle('active')">AMD</div>
                    <div class="chip" onclick="this.classList.toggle('active')">FVG</div>
                    <div class="chip" onclick="this.classList.toggle('active')">SMT</div>
                    <div class="chip" onclick="this.classList.toggle('active')">OB</div>
                </div></div>

                <div class="form-item"><label>Result</label><div class="chip-grid">
                    <div class="chip" onclick="setV('res', 'TP', this)">💰 TP</div>
                    <div class="chip" onclick="setV('res', 'SL', this)">💀 SL</div>
                    <div class="chip" onclick="setV('res', 'BE', this)">⚖️ BE</div>
                </div></div>

                <div class="form-item"><label>P&L ($)</label><input type="number" id="pnl" placeholder="0.00" style="background:#050a14; border:1px solid #1f2937; color:white; padding:12px; width:100%; border-radius:10px;"></div>

                <div class="photo-grid">
                    <div class="upload-box">
                        <label>📸 BEFORE</label>
                        <input type="file" onchange="procImg(this, 'pb')">
                        <img id="pb">
                    </div>
                    <div class="upload-box">
                        <label>📸 AFTER</label>
                        <input type="file" onchange="procImg(this, 'pa')">
                        <img id="pa">
                    </div>
                </div>

                <button type="button" class="btn-save" onclick="save()">🚀 SAVE TRADE</button>
            </form>
            <div id="hist"></div>
        </div></div>

        <div id="monitor-tab" class="tab-content"><div class="inner-padding">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <select id="mon-pair" class="mon-select" onchange="loadData()">
                    <option value="ALL">ALL PAIRS</option>
                    <option value="XAUUSD">XAUUSD</option><option value="BTCUSD">BTCUSD</option>
                    <option value="EURUSD">EURUSD</option><option value="NAS100">NAS100</option>
                </select>
                <select id="mon-month" class="mon-select" onchange="loadData()">
                    <option value="ALL">ALL TIME</option>
                    <option value="01">JAN</option><option value="02">FEB</option>
                    <option value="03">MAR</option><option value="04">APR</option>
                    <option value="05">MEI</option>
                </select>
            </div>
            <div style="background:var(--card); border:1px solid #1f2937; border-radius:20px; padding:15px; height:220px;"><canvas id="equityChart"></canvas></div>
            <div class="stats-grid">
                <div class="stat-card">Total P&L<br><b id="st-pnl" style="color:var(--blue); font-size:1.2rem;">$ 0</b></div>
                <div class="stat-card">Win Rate<br><b id="st-wr" style="color:var(--green); font-size:1.2rem;">0%</b></div>
            </div>
            <div id="cal" class="calendar-grid"></div>
        </div></div>

        <div id="chart-tab" class="tab-content"><div class="inner-padding"><div id="tv_v60" style="height:500px; border-radius:20px; overflow:hidden;"></div></div></div>
        <div id="announce-tab" class="tab-content"><div class="inner-padding"><div style="background:var(--card); padding:20px; border-radius:20px; border-left:5px solid var(--red);"><h3>SERVER INFO</h3><p>Maintenance every Saturday.</p></div></div></div>
        <div id="community-tab" class="tab-content"><div class="inner-padding"><h3>COMMUNITY CHAT</h3><div id="chat-messages" style="height:400px; overflow-y:auto; background:#0d1117; padding:15px; border-radius:20px;"></div></div></div>
        <div id="broker-tab" class="tab-content"><div class="inner-padding"><div class="stat-card"><h3>EXNESS</h3><button onclick="window.open('https://one.exnessonelink.com/a/f4ntqgcba4')" style="width:100%; padding:15px; background:var(--blue); border-radius:10px;">DAFTAR</button></div></div></div>
        <div id="donasi-tab" class="tab-content" style="text-align:center;"><div class="inner-padding"><img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=FS-DONATION" style="border:5px solid white; border-radius:20px;"></div></div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCAXjaw82F1gdZUZfpDi1_9-5-ISU0aDVs", authDomain: "freedomsyndicatecloud.firebaseapp.com", databaseURL: "https://freedomsyndicatecloud-default-rtdb.firebaseio.com", projectId: "freedomsyndicatecloud", storageBucket: "freedomsyndicatecloud.firebasestorage.app", appId: "1:915558934014:web:08442d20712f2010f58caf" };
        firebase.initializeApp(config); const auth = firebase.auth(), rtdb = firebase.database(); 
        let curU=null, sRes='', sSession='', bB='', bA='', myChart=null, allTrades=[];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.querySelector('.side-overlay').classList.toggle('show'); }
        function openTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.side-link').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'chart-tab') updateChart();
            toggleMenu();
        }

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(u => { 
            if(u){ curU = u; document.getElementById('auth-screen').style.display='none'; document.getElementById('display-user').innerText = u.email; loadData(); }
            else { document.getElementById('auth-screen').style.display='flex'; }
        });

        function setV(t, v, el) { el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); if(t==='res') sRes=v; if(t==='session') sSession=v; }
        function procImg(i, id) { const f=i.files[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ const b=e.target.result; document.getElementById(id).src=b; document.getElementById(id).style.display='block'; if(id==='pb') bB=b; else bA=b; }; r.readAsDataURL(f); }

        function save() {
            if(!sRes || !curU) return alert("Pilih Result!");
            const data = { 
                date: document.getElementById('date').value || new Date().toISOString().split('T')[0], 
                pair: document.getElementById('pair').value, 
                session: sSession || 'N/A', 
                pnl: parseFloat(document.getElementById('pnl').value) || 0, 
                res: sRes, bef: bB, aft: bA 
            };
            rtdb.ref('users/' + curU.uid + '/trades').push(data).then(() => { alert("SAVED!"); loadData(); location.reload(); });
        }

        function loadData() { 
            if(!curU) return;
            rtdb.ref('users/' + curU.uid + '/trades').on('value', snap => { 
                allTrades = snap.val() ? Object.entries(snap.val()).map(([id, val]) => ({...val, id})) : []; 
                render(allTrades); 
            }); 
        }

        function render(trades) {
            const h = document.getElementById('hist'); h.innerHTML = '';
            let totalP = 0, win = 0, filteredCount = 0, eqData = [0], labels = ['0'];
            const fM = document.getElementById('mon-month').value;
            const fP = document.getElementById('mon-pair').value;

            const sorted = trades.sort((a,b) => new Date(a.date) - new Date(b.date));
            sorted.forEach(t => {
                const tM = t.date.split('-')[1];
                const matchM = (fM === 'ALL' || tM === fM);
                const matchP = (fP === 'ALL' || t.pair === fP);

                if(matchM && matchP) {
                    totalP += t.pnl; if(t.res === 'TP') win++; filteredCount++;
                    eqData.push(totalP); labels.push(t.date.split('-')[2]);
                }
            });

            trades.reverse().forEach(t => {
                const card = document.createElement('div'); card.className = 'history-card';
                card.innerHTML = `<div class="h-header"><span>${t.date} | ${t.pair}</span><span style="color:${t.res==='TP'?'var(--green)':'var(--red)'}">${t.res} ($${t.pnl})</span></div>
                <div class="tracker-display">${t.bef ? `<img src="${t.bef}" class="tracker-img">` : ''}${t.aft ? `<img src="${t.aft}" class="tracker-img">` : ''}</div>`;
                h.appendChild(card);
            });

            document.getElementById('st-pnl').innerText = `$ ${totalP}`;
            document.getElementById('st-wr').innerText = filteredCount ? Math.round((win/filteredCount)*100)+"%" : "0%";
            
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('equityChart').getContext('2d');
            myChart = new Chart(ctx, { type:'line', data:{labels, datasets:[{data:eqData, borderColor:totalP >= 0 ? '#4ade80' : '#ef4444', tension:0.4, fill:true, backgroundColor:'rgba(56,189,248,0.1)'}]}, options:{maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{grid:{color:'#1f2937'}}}}});
        }

        function calcLot() {
            const b = parseFloat(document.getElementById('calc-bal').value), r = parseFloat(document.getElementById('calc-risk').value), s = parseFloat(document.getElementById('calc-sl').value);
            if(b && r && s) { 
                const l = (b*(r/100))/(s*10); 
                document.getElementById('res-lot').innerText = l.toFixed(2); 
                document.getElementById('res-margin').innerText = (b*(r/100)).toFixed(2); 
            }
        }

        function updateChart() {
            document.getElementById('tv_v60').innerHTML = `<iframe style="width:100%; height:100%; border:none;" src="https://s.tradingview.com/widgetembed/?symbol=XAUUSD&interval=15&theme=dark"></iframe>`;
        }
    </script>
</body>
</html>
