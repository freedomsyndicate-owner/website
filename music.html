<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Syndicate - Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #3b82f6; --bg: #09090b; --card: #18181b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Premium Blue */
        .header { padding: 30px 20px; background: linear-gradient(135deg, #1e3a8a 0%, var(--bg) 100%); border-bottom: 1px solid #27272a; }
        .header h1 { font-size: 22px; font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; }
        .search-box { width: 100%; background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; color: white; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        /* List Lagu */
        .main-content { flex: 1; overflow-y: auto; padding: 20px 20px 150px; }
        .track-card { display: flex; align-items: center; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .track-card:active { transform: scale(0.97); }
        .track-card img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { display: block; font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #888; }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 12, 0.98); backdrop-filter: blur(15px); padding: 20px; border-top: 1px solid #27272a; }
        .prog-container { width: 100%; height: 5px; background: #333; border-radius: 5px; margin-bottom: 15px; cursor: pointer; }
        .prog-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; transition: width 0.1s linear; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; }
        .play-btn { background: white; color: black; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        #msg { text-align: center; color: var(--accent); font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FREEDOM SYNDICATE</h1>
        <input type="text" id="search-input" class="search-box" placeholder="Cari lagu apa saja (Full)...">
    </div>

    <div class="main-content" id="results">
        <p style="text-align: center; color: #444; margin-top: 50px;">Cari musik favoritmu di sini</p>
    </div>

    <div class="player-bar">
        <div id="msg"><i class="fas fa-spinner fa-spin"></i> Loading music...</div>
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <img id="p-img" src="" style="width:40px; border-radius:4px; margin-right:12px; display:none;">
            <div style="overflow: hidden;">
                <p id="p-title" style="font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Siap memutar musik</p>
                <p id="p-artist" style="font-size:12px; color:#666;">Full Song Player</p>
            </div>
        </div>
        <div class="prog-container" id="prog-wrap">
            <div class="prog-bar" id="prog-fill"></div>
        </div>
        <div class="controls">
            <i class="fas fa-step-backward" style="color: #444"></i>
            <div class="play-btn" id="play-btn"><i class="fas fa-play" id="play-icon"></i></div>
            <i class="fas fa-step-forward" style="color: #444"></i>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const searchInput = document.getElementById('search-input');
        const resultsDiv = document.getElementById('results');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const msg = document.getElementById('msg');

        async function search(q) {
            if (q.length < 3) return;
            msg.style.display = "block";
            try {
                // API Full Music Saavn
                const res = await fetch(`https://saavn.me/search/songs?query=${encodeURIComponent(q)}`);
                const data = await res.json();
                renderResults(data.data.results);
            } catch (e) { 
                console.error("Fetch Error"); 
                resultsDiv.innerHTML = "<p style='text-align:center;'>Gagal memuat lagu. Coba lagi.</p>";
            }
            msg.style.display = "none";
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = "";
            songs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <img src="${s.image[1].link}">
                    <div class="track-info">
                        <span class="track-name">${s.name}</span>
                        <span class="track-artist">${s.primaryArtists}</span>
                    </div>
                    <i class="fas fa-play-circle" style="color:var(--accent); font-size:20px;"></i>
                `;
                card.onclick = () => {
                    document.getElementById('p-title').innerText = s.name;
                    document.getElementById('p-artist').innerText = s.primaryArtists;
                    document.getElementById('p-img').src = s.image[0].link;
                    document.getElementById('p-img').style.display = "block";
                    
                    // Link MP3 320kbps (Full)
                    audio.src = s.downloadUrl[4].link;
                    audio.play().then(() => {
                        playIcon.className = "fas fa-pause";
                    }).catch(() => {
                        playIcon.className = "fas fa-play";
                    });
                };
                resultsDiv.appendChild(card);
            });
        }

        let t;
        searchInput.oninput = (e) => {
            clearTimeout(t);
            t = setTimeout(() => search(e.target.value), 800);
        };

        playBtn.onclick = () => {
            if (audio.src) {
                if (audio.paused) { audio.play(); playIcon.className = "fas fa-pause"; }
                else { audio.pause(); playIcon.className = "fas fa-play"; }
            }
        };

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('prog-fill').style.width = pct + "%";
        };

        document.getElementById('prog-wrap').onclick = (e) => {
            audio.currentTime = (e.offsetX / e.target.clientWidth) * audio.duration;
        };
    </script>
</body>
</html>
