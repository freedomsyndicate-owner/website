<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Syndicate - Full Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #3b82f6; --bg: #09090b; --card: #18181b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 30px 20px; background: linear-gradient(to bottom, #1e3a8a66, var(--bg)); }
        .search-box { width: 100%; background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; color: white; outline: none; }

        .main { flex: 1; overflow-y: auto; padding: 0 20px 180px; }
        .track { display: flex; align-items: center; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .track img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { display: block; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #888; }

        .player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px; border-top: 1px solid #27272a; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 10px; }
        .play-btn { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Sembunyikan Video YouTube */
        #yt-player { position: absolute; top: -1000px; left: -1000px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin-bottom:15px; font-size:20px;">FREEDOM SYNDICATE</h1>
        <input type="text" id="search" class="search-box" placeholder="Cari Lagu Full (Contoh: Hindia)...">
    </div>

    <div class="main" id="list">
        <p style="text-align:center; color:#444; margin-top:50px;">Cari lagu full durasi di sini...</p>
    </div>

    <div id="yt-player"></div>

    <div class="player">
        <div style="display:flex; align-items:center; margin-bottom:10px;">
            <img id="p-img" src="" style="width:35px; border-radius:4px; margin-right:10px; display:none;">
            <div style="flex:1; overflow:hidden;">
                <p id="p-title" style="font-size:13px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Pilih lagu...</p>
                <p id="p-artist" style="font-size:11px; color:gray;">YouTube Engine Active</p>
            </div>
        </div>
        <div class="controls">
            <i class="fas fa-backward-step"></i>
            <div class="play-btn" id="play"><i class="fas fa-play" id="icon"></i></div>
            <i class="fas fa-forward-step"></i>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isYTReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0',
                events: { 'onReady': () => { isYTReady = true; } }
            });
        }

        const listDiv = document.getElementById('list');
        const searchInput = document.getElementById('search');

        async function doSearch(q) {
            if (q.length < 2) return;
            // Ambil data dari iTunes untuk list lagu yang rapi
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=20`);
            const data = await res.json();
            
            listDiv.innerHTML = "";
            data.results.forEach(s => {
                const item = document.createElement('div');
                item.className = 'track';
                item.innerHTML = `
                    <img src="${s.artworkUrl100}">
                    <div class="track-info">
                        <span class="track-name">${s.trackName}</span>
                        <span class="track-artist">${s.artistName}</span>
                    </div>
                `;
                item.onclick = () => {
                    document.getElementById('p-title').innerText = s.trackName;
                    document.getElementById('p-img').src = s.artworkUrl100;
                    document.getElementById('p-img').style.display = "block";
                    
                    // Putar versi Full dari YouTube secara otomatis
                    const searchQuery = `${s.artistName} ${s.trackName} official audio`;
                    player.loadPlaylist({
                        list: searchQuery,
                        listType: 'search',
                        index: 0
                    });
                    document.getElementById('icon').className = "fas fa-pause";
                };
                listDiv.appendChild(item);
            });
        }

        searchInput.oninput = (e) => {
            clearTimeout(window.t);
            window.t = setTimeout(() => doSearch(e.target.value), 800);
        };

        document.getElementById('play').onclick = () => {
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                document.getElementById('icon').className = "fas fa-play";
            } else {
                player.playVideo();
                document.getElementById('icon').className = "fas fa-pause";
            }
        };
    </script>
</body>
</html>
