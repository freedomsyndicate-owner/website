<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Syndicate - Music Station</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #3b82f6; --bg: #09090b; --card: #18181b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 30px 20px; background: linear-gradient(to bottom, #1e3a8a66, var(--bg)); text-align: center; }
        .header h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 20px; color: var(--blue); font-weight: 800; }
        
        .search-box { width: 100%; background: var(--card); border: 1px solid #27272a; border-radius: 12px; padding: 15px; color: white; outline: none; text-align: center; }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        
        /* Widget Box */
        .player-container {
            background: var(--card);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid var(--blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            margin-top: 20px;
        }

        #sc-player {
            width: 100%;
            height: 450px;
            border-radius: 15px;
            border: none;
        }

        .instructions { margin-top: 20px; font-size: 13px; color: #666; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FREEDOM SYNDICATE</h1>
        <input type="text" id="search-input" class="search-box" placeholder="Ketik Artis (Contoh: Hindia)...">
    </div>

    <div class="main-content">
        <div class="player-container">
            <iframe id="sc-player" 
                    scrolling="no" 
                    frameborder="no" 
                    allow="autoplay" 
                    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/911291884&color=%233b82f6&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="instructions">
            <p><strong>Tips Instan:</strong> Klik ikon cari di dalam player atau ketik di kolom atas lalu tekan <b>Enter</b> untuk mencari semua lagu favoritmu secara Full Durasi.</p>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const player = document.getElementById('sc-player');

        // Fungsi mencari musik secara otomatis
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = encodeURIComponent(searchInput.value);
                // Mengarahkan widget untuk mencari lagu yang diinginkan
                player.src = `https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/search/sounds?q=${query}&color=%233b82f6&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`;
                
                alert("Mencari lagu: " + searchInput.value + "\nSilakan tunggu dan klik lagu yang muncul di bawah.");
            }
        });
    </script>
</body>
</html>
