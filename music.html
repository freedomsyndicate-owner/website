<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Syndicate - Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #3b82f6; --bg: #09090b; --card: #18181b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 30px 20px; background: linear-gradient(to bottom, #1e3a8a66, var(--bg)); }
        .search-box { width: 100%; background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; color: white; outline: none; }

        .main { flex: 1; overflow-y: auto; padding: 0 20px 150px; }
        .track { display: flex; align-items: center; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .track img { width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { display: block; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: #888; }

        .player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px; border-top: 1px solid #27272a; }
        .progress { width: 100%; height: 4px; background: #333; border-radius: 5px; margin-bottom: 15px; }
        .bar { height: 100%; background: var(--blue); width: 0%; border-radius: 5px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; }
        .play-btn { background: white; color: black; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin-bottom:15px; font-size:20px; letter-spacing:1px;">FREEDOM SYNDICATE</h1>
        <input type="text" id="search" class="search-box" placeholder="Ketik Judul Lagu (Contoh: Hindia)...">
    </div>

    <div class="main" id="list">
        <p style="text-align:center; color:#444; margin-top:50px;">Cari lagu di atas...</p>
    </div>

    <div class="player">
        <div style="display:flex; align-items:center; margin-bottom:10px;">
            <img id="p-img" src="" style="width:35px; border-radius:4px; margin-right:10px; display:none;">
            <span id="p-txt" style="font-size:13px;">Siap memutar musik</span>
        </div>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div class="controls">
            <i class="fas fa-backward-step"></i>
            <div class="play-btn" id="play"><i class="fas fa-play" id="icon"></i></div>
            <i class="fas fa-forward-step"></i>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const listDiv = document.getElementById('list');
        const searchInput = document.getElementById('search');

        async function doSearch(q) {
            if (q.length < 2) return;
            try {
                // API iTunes ini paling stabil untuk GitHub Pages
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=20`);
                const data = await res.json();
                
                listDiv.innerHTML = "";
                data.results.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'track';
                    item.innerHTML = `
                        <img src="${s.artworkUrl100}">
                        <div class="track-info">
                            <span class="track-name">${s.trackName}</span>
                            <span class="track-artist">${s.artistName}</span>
                        </div>
                    `;
                    item.onclick = () => {
                        document.getElementById('p-txt').innerText = s.trackName;
                        document.getElementById('p-img').src = s.artworkUrl100;
                        document.getElementById('p-img').style.display = "block";
                        audio.src = s.previewUrl;
                        audio.play();
                        document.getElementById('icon').className = "fas fa-pause";
                    };
                    listDiv.appendChild(item);
                });
            } catch (e) {
                listDiv.innerHTML = "<p style='text-align:center;'>Gagal memuat.</p>";
            }
        }

        searchInput.oninput = (e) => {
            clearTimeout(window.t);
            window.t = setTimeout(() => doSearch(e.target.value), 800);
        };

        document.getElementById('play').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('icon').className = "fas fa-pause"; }
            else { audio.pause(); document.getElementById('icon').className = "fas fa-play"; }
        };

        audio.ontimeupdate = () => {
            document.getElementById('bar').style.width = (audio.currentTime / audio.duration) * 100 + "%";
        };
    </script>
</body>
</html>
